<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="tracker-card" aria-labelledby="tracker-title">
      <header class="tracker-header">
        <div>
          <p class="subtitle">Personal Finance</p>
          <h1 id="tracker-title">Expense Tracker</h1>
        </div>
        <button id="clear-btn" type="button" class="ghost-btn">Clear All</button>
      </header>

      <section class="balance-panel">
        <div>
          <p class="label">Your Balance</p>
          <h2 id="balance">$0.00</h2>
        </div>
        <div class="summary-grid">
          <div class="summary-card income-card">
            <p class="label">Income</p>
            <p id="money-plus" class="money money-plus">+$0.00</p>
          </div>
          <div class="summary-card expense-card">
            <p class="label">Expenses</p>
            <p id="money-minus" class="money money-minus">-$0.00</p>
          </div>
        </div>
      </section>

      <section class="transaction-form" aria-labelledby="form-title">
        <h2 id="form-title">Add New Transaction</h2>
        <form id="transaction-form">
          <div class="form-row">
            <label for="text">Description</label>
            <input type="text" id="text" placeholder="Enter description" required />
          </div>
          <div class="form-row">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Positive for income, negative for expense" step="0.01" required />
          </div>
          <button type="submit" class="primary-btn">Add Transaction</button>
        </form>
      </section>

      <section class="history-panel" aria-labelledby="history-title">
        <h2 id="history-title">Transaction History</h2>
        <ul id="list" class="transaction-list"></ul>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
