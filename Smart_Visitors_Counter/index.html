<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Visitors Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="counter-container">
        <h2>Smart Visitors Counter</h2>
        <div class="display-box">
            <h1 id="count">0</h1>
            <p id="alarm-msg" class="hidden">⚠️ Maximum Capacity Reached!</p>
        </div>
        <div class="controls">
            <button id="enter-btn" class="btn enter">Visitor Entered (+)</button>
            <button id="exit-btn" class="btn exit">Visitor Exited (-)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
