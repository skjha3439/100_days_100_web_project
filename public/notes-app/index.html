<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">  
  <title>Notes App</title>
 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="app-header">
      <div>
        <p class="eyebrow">Private workspace</p>
        <h1>Notes App</h1>
      </div>
      <div class="header-actions">
        <div class="search-bar">
          <i class="uil uil-search"></i>
          <input type="text" id="search-input" placeholder="Search notes, tags, ideas...">
        </div>
        <button class="clear-notes" type="button" aria-label="Delete all saved notes">
          <i class="uil uil-trash-alt"></i>
          <span>Clear notes</span>
        </button>
      </div>
    </section>
  
  <div class="popup-box">
    <div class="popup">
      <div class="content">
        <header>
          <p></p>
          <i class="uil uil-times"></i>
        </header>
        <form action="#" class="was-validated">
          <div class="row title">
            <label>Title</label>
            <input type="text" spellcheck="false" required>
            <div class="invalid-feedback">This Field is Required!!</div>
          </div>
          <div class="row description">
            <label>Description</label>
            <textarea spellcheck="false" required></textarea>
            <div class="invalid-feedback">Enter some description</div>
          </div>
          <div class="row tags">
            <label>Tags</label>
            <input type="text" spellcheck="false" placeholder="Enter tags separated by commas">
          </div>
          <div class="row password">
            <label>Password</label>
            <input type="password" spellcheck="false">
          </div>
          <button></button>
        </form>
      </div>
    </div>
    <ul class="wrapper">
      <li class="add-box">
        <div class="icon"><i class="uil uil-plus"></i></div>
        <p>Add new note</p>
      </li>
    </ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
