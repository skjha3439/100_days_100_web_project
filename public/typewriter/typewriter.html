<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #f8fafc;
            --glow-color: rgba(59, 130, 246, 0.15);
            --paper-bg: #ffffff;
            --paper-text: #222222;
            --paper-line: #d0d0d0;
            --body-grad-a: #667eea;
            --body-grad-b: #764ba2;
            --body-grad-c: #5a4a8a;
            /* dark mode keys = black with white text */
            --key-bg-a: #1a1a1a;
            --key-bg-b: #111111;
            --key-border: #333333;
            --key-text: #f5f5f5;
            --key-active-bg: #1e3a5f;
            --key-active-border: #3b82f6;
            --key-active-shadow: rgba(59, 130, 246, 0.55);
            --input-bg: rgba(255,255,255,0.07);
            --input-border: rgba(255,255,255,0.2);
            --input-color: #f5f5f5;
            --input-placeholder: rgba(255,255,255,0.55);
        }

        body.light-theme {
            --bg-color: #ffffff;
            --text-color: #111111;
            --glow-color: rgba(59, 130, 246, 0.10);
            --body-grad-a: #7c85d8;
            --body-grad-b: #8b5fad;
            --body-grad-c: #6a56a2;
            /* light mode keys = white with dark text (original) */
            --key-bg-a: #f5f5f5;
            --key-bg-b: #e0e0e0;
            --key-border: #c8c8c8;
            --key-text: #222222;
            --key-active-bg: #dbeafe;
            --key-active-border: #3b82f6;
            --key-active-shadow: rgba(59, 130, 246, 0.5);
            --input-bg: rgba(0,0,0,0.07);
            --input-border: rgba(0,0,0,0.18);
            --input-color: #f5f5f5;
            --input-placeholder: rgba(255,255,255,0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: 'Courier Prime', 'Courier New', monospace;
            padding: 20px;
            position: relative;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--glow-color);
            filter: blur(90px);
            z-index: 0;
            pointer-events: none;
            animation: floatingGlow 8s ease-in-out infinite;
        }

        body::before { top: -120px; left: -120px; }
        body::after  { bottom: -120px; right: -120px; animation-delay: 4s; }

        @keyframes floatingGlow {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(28px); }
        }

        /* ---- Theme toggle ---- */
        .theme-toggle {
            position: fixed;
            top: 20px; right: 20px;
            font-size: 30px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
            user-select: none;
        }
        .theme-toggle:hover { transform: scale(1.15) rotate(20deg); }

        /* ---- Machine wrapper ---- */
        .typewriter-machine {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: min(96vw, 1200px);
        }

        /* ---- Paper ---- */
        .paper-sheet {
            width: 100%;
            min-height: 280px;
            background: var(--paper-bg);
            color: var(--paper-text);
            padding: 28px 30px;
            border-radius: 0;
            box-shadow: 0 0 32px rgba(59,130,246,0.18);
            font-family: 'Courier Prime', monospace;
            font-size: clamp(1.2rem, 1.8vw, 1.9rem);
            line-height: 2.05;
            word-wrap: break-word;
            overflow-wrap: break-word;
            letter-spacing: 0.04em;
            position: relative;
            transition: background 0.4s ease, color 0.4s ease;
            text-align: left;
        }

        .paper-sheet::after {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 31px,
                var(--paper-line) 31px,
                var(--paper-line) 32px
            );
            pointer-events: none;
            border-radius: 8px 8px 0 0;
        }

        #typewriterText { position: relative; z-index: 2; white-space: pre-wrap; }

        .cursor-paper {
            display: inline-block;
            background-color: var(--paper-text);
            width: 2px;
            height: 1em;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink-paper 1s infinite;
            position: relative;
            z-index: 2;
            transition: background-color 0.4s;
        }

        .carriage-bar:focus-within + .paper-sheet .cursor-paper {
            display: none;
        }

        @keyframes blink-paper {
            0%,50%  { opacity: 1; }
            51%,100%{ opacity: 0; }
        }

        /* ---- Typewriter body ---- */
        .typewriter-body {
            width: 100%;
            background: linear-gradient(135deg, var(--body-grad-a) 0%, var(--body-grad-b) 50%, var(--body-grad-c) 100%);
            padding: 44px 36px 40px;
            border-radius: 0 0 18px 18px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.45), inset 0 2px 5px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* ---- Input ---- */
        .input-area { display: flex; flex-direction: column; gap: 10px; }

        #userInput {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--input-color);
            font-family: 'Courier Prime', monospace;
            transition: border-color 0.25s, background-color 0.25s, box-shadow 0.25s;
        }
        #userInput:focus {
            outline: none;
            border-color: rgba(59,130,246,0.55);
            background-color: rgba(255,255,255,0.12);
            box-shadow: 0 0 10px rgba(59,130,246,0.22);
        }
        #userInput::placeholder { color: var(--input-placeholder); }

        /* ---- Keyboard ---- */
        .keyboard {
            display: flex; flex-direction: column;
            align-items: center; gap: 13px; width: 100%;
        }

        .keyboard-row {
            display: flex; gap: 11px;
            justify-content: center; flex-wrap: wrap;
        }

        .key {
            width: 54px; height: 54px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--key-bg-a), var(--key-bg-b));
            border: 2px solid var(--key-border);
            box-shadow:
                0 5px 10px rgba(0,0,0,0.32),
                inset 0 1px 3px rgba(255,255,255,0.8),
                inset 0 -2px 3px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            color: var(--key-text);
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
            position: relative;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .key:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.38), inset 0 1px 3px rgba(255,255,255,0.8);
        }

        .key.pressed,
        .key:active {
            transform: translateY(2px);
            background: linear-gradient(145deg, var(--key-active-bg), #bfdbfe);
            border-color: var(--key-active-border);
            box-shadow:
                0 2px 6px rgba(0,0,0,0.28),
                0 0 10px var(--key-active-shadow),
                inset 0 1px 2px rgba(255,255,255,0.6);
        }

        #row-numbers .key {
            width: 70px;
            border-radius: 14px;
            font-size: 13px;
        }

        .key.space {
            width: 420px;
            border-radius: 22px;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .key.backspace {
            width: 90px;
            border-radius: 10px;
            font-size: 11px;
        }

        .key.enter-key {
            width: 90px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* ---- Metallic Carriage Bar ---- */
        .carriage-bar {
            width: 100%;
            height: 64px;
            background: linear-gradient(to bottom, #444 0%, #999 15%, #222 35%, #444 70%, #111 100%);
            border-radius: 12px 12px 0 0;
            border: 2px solid #2d2d2d;
            border-bottom: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 2px 3px rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 3;
            margin-bottom: -1px; /* Seamless overlap with paper sheet */
        }

        .carriage-knob {
            width: 22px;
            height: 36px;
            background: repeating-linear-gradient(
                90deg,
                #222,
                #222 2px,
                #555 2px,
                #555 4px
            );
            border: 2px solid #111;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .carriage-knob:hover {
            transform: rotate(15deg);
        }
        .knob-left { margin-right: 10px; }
        .knob-right { margin-left: 10px; }

        .carriage-controls {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 1.5vw, 20px);
            padding: 0 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .control-group label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: Arial, sans-serif;
        }

        .control-group select,
        .control-group input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            outline: none;
        }

        .control-group select {
            cursor: pointer;
            padding-right: 5px;
        }

        .control-group select option {
            background: #111;
            color: #fff;
        }

        .control-group input {
            width: 110px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.3);
            padding-bottom: 1px;
            transition: border-bottom-color 0.2s;
        }
        .control-group input:focus {
            border-bottom: 1px solid #3b82f6;
        }
        .control-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .button-group-carriage {
            display: flex;
            gap: 6px;
        }

        .carriage-btn {
            border: none;
            padding: 7px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: Arial, sans-serif;
        }

        .carriage-btn:active {
            transform: translateY(1px);
        }

        .btn-red {
            background: linear-gradient(to bottom, #ef4444 0%, #b91c1c 100%);
            color: white;
            border: 1px solid #991b1b;
        }
        .btn-red:hover {
            background: linear-gradient(to bottom, #f87171 0%, #dc2626 100%);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.45);
        }

        .btn-silver {
            background: linear-gradient(to bottom, #e2e8f0 0%, #94a3b8 100%);
            color: #1e293b;
            border: 1px solid #475569;
        }
        .btn-silver:hover {
            background: linear-gradient(to bottom, #f1f5f9 0%, #cbd5e1 100%);
            box-shadow: 0 0 10px rgba(226, 232, 240, 0.4);
        }

        /* ---- Toast Alert ---- */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(15, 23, 42, 0.95);
            color: #f8fafc;
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-size: 14px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(59, 130, 246, 0.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
        }

        .toast-container.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ---- Responsive ---- */
        @media (max-width: 900px) {
            .carriage-bar {
                height: auto;
                flex-direction: column;
                padding: 12px;
                gap: 10px;
                border-radius: 12px 12px 0 0;
            }
            .carriage-knob {
                display: none;
            }
            .carriage-controls {
                flex-wrap: wrap;
                width: 100%;
                justify-content: center;
                gap: 8px;
            }
            .control-group {
                flex: 1 1 120px;
                justify-content: center;
            }
            .control-group input {
                width: 100%;
            }
            .button-group-carriage {
                width: 100%;
                justify-content: center;
            }
            .carriage-btn {
                flex: 1;
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .paper-sheet { padding: 18px; min-height: 140px; font-size: 1.1rem; }
            .typewriter-body { padding: 18px; gap: 14px; }
            .keyboard-row { gap: 7px; }
            .key { width: 38px; height: 38px; font-size: 8px; }
            .key.space { width: 230px; }
            .key.backspace, .key.enter-key { width: 58px; }
            .theme-toggle { top: 10px; right: 12px; font-size: 22px; }
        }

        @media (max-width: 480px) {
            .paper-sheet { padding: 13px; min-height: 110px; font-size: 0.95rem; }
            .typewriter-body { padding: 12px; gap: 10px; }
            .keyboard-row { gap: 5px; }
            .key { width: 32px; height: 32px; font-size: 7px; }
            .key.space { width: 190px; }
            .key.backspace, .key.enter-key { width: 50px; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="typewriter-machine">
        <div class="carriage-bar">
            <div class="carriage-knob knob-left"></div>
            <div class="carriage-controls">
                <div class="control-group">
                    <label for="pdfTheme"><i class="fas fa-palette"></i> Style</label>
                    <select id="pdfTheme">
                        <option value="vintage">📜 Vintage</option>
                        <option value="editorial">✍️ Editorial</option>
                        <option value="modern">⚡ Modern</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="pdfTitle"><i class="fas fa-feather"></i> Title</label>
                    <input type="text" id="pdfTitle" placeholder="Doc Title..." maxlength="40">
                </div>
                <div class="control-group">
                    <label for="pdfAuthor"><i class="fas fa-signature"></i> Author</label>
                    <input type="text" id="pdfAuthor" placeholder="Byline..." maxlength="30">
                </div>
                <div class="button-group-carriage">
                    <button id="exportPdfBtn" class="carriage-btn btn-red" title="Export to PDF">
                        <i class="fas fa-file-pdf"></i> Export
                    </button>
                    <button id="clearPaperBtn" class="carriage-btn btn-silver" title="Reset Paper">
                        <i class="fas fa-trash-alt"></i> Clear
                    </button>
                </div>
            </div>
            <div class="carriage-knob knob-right"></div>
        </div>

        <div class="paper-sheet">
            <span id="typewriterText"></span><span class="cursor-paper"></span>
        </div>

        <div class="typewriter-body">
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type here or click the keys below…">
            </div>

            <div class="keyboard">
                <div class="keyboard-row" id="row-numbers">
                    <div class="key" data-char="1">1</div>
                    <div class="key" data-char="2">2</div>
                    <div class="key" data-char="3">3</div>
                    <div class="key" data-char="4">4</div>
                    <div class="key" data-char="5">5</div>
                    <div class="key" data-char="6">6</div>
                    <div class="key" data-char="7">7</div>
                    <div class="key" data-char="8">8</div>
                    <div class="key" data-char="9">9</div>
                    <div class="key" data-char="0">0</div>
                </div>
                <div class="keyboard-row" id="row1">
                    <div class="key" data-char="Q">Q</div>
                    <div class="key" data-char="W">W</div>
                    <div class="key" data-char="E">E</div>
                    <div class="key" data-char="R">R</div>
                    <div class="key" data-char="T">T</div>
                    <div class="key" data-char="Y">Y</div>
                    <div class="key" data-char="U">U</div>
                    <div class="key" data-char="I">I</div>
                    <div class="key" data-char="O">O</div>
                    <div class="key" data-char="P">P</div>
                </div>
                <div class="keyboard-row">
                    <div class="key" data-char="A">A</div>
                    <div class="key" data-char="S">S</div>
                    <div class="key" data-char="D">D</div>
                    <div class="key" data-char="F">F</div>
                    <div class="key" data-char="G">G</div>
                    <div class="key" data-char="H">H</div>
                    <div class="key" data-char="J">J</div>
                    <div class="key" data-char="K">K</div>
                    <div class="key" data-char="L">L</div>
                </div>
                <div class="keyboard-row">
                    <div class="key" data-char="Z">Z</div>
                    <div class="key" data-char="X">X</div>
                    <div class="key" data-char="C">C</div>
                    <div class="key" data-char="V">V</div>
                    <div class="key" data-char="B">B</div>
                    <div class="key" data-char="N">N</div>
                    <div class="key" data-char="M">M</div>
                </div>
                <div class="keyboard-row">
                    <div class="key enter-key" data-char="ENTER">↵ RET</div>
                    <div class="key space" data-char=" ">SPACE</div>
                    <div class="key backspace" data-char="BACKSPACE">⌫ DEL</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="pdfToast"></div>

    <script>
        const typewriterText = document.getElementById("typewriterText");
        const userInput      = document.getElementById("userInput");
        const themeToggle    = document.getElementById("themeToggle");

        // ---- Audio ----
        let audioCtx;
        function getAudioCtx() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            }
            return audioCtx;
        }

        // Realistic typewriter clack — sharp noise burst + pitched transient
        function playClick(noiseVol, freq1, freq2, dur) {
            const ctx = getAudioCtx();
            if (!ctx) return;
            try {
                const now = ctx.currentTime;

                // Noise burst (the mechanical "clack")
                const bufSize = Math.ceil(ctx.sampleRate * dur);
                const buf  = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) {
                    const env = Math.pow(1 - i/bufSize, 3);
                    data[i] = (Math.random()*2-1) * env;
                }
                const noise = ctx.createBufferSource();
                const noiseGain = ctx.createGain();
                // High-pass filter for crisp click
                const hpf = ctx.createBiquadFilter();
                hpf.type = 'highpass';
                hpf.frequency.value = 800;
                noise.buffer = buf;
                noiseGain.gain.setValueAtTime(noiseVol, now);
                noise.connect(hpf);
                hpf.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.start(now);

                // Tonal transient
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(freq1, now);
                osc.frequency.exponentialRampToValueAtTime(freq2, now + dur);
                gain.gain.setValueAtTime(noiseVol * 0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
                osc.start(now);
                osc.stop(now + dur);
            } catch(e){}
        }

        // Letters & numbers: sharp crisp clack — same sound for all
        function playKeyClick()   { playClick(0.55, 900, 200, 0.035); }

        // RET, SPACE, DEL: one unified heavy thud — clearly different from letter keys
        function playHeavyKey()   { playClick(0.40, 140,  75, 0.12);  }
        function playSpaceClick() { playHeavyKey(); }
        function playReturn()     { playHeavyKey(); }
        function playBackspace()  { playHeavyKey(); }

        // ---- Live typing on paper ----
        // The paper shows what the user types character by character with the sound.
        // Input box is synced.

        let paperContent = '';

        function addCharToPaper(ch) {
            paperContent += ch;
            typewriterText.textContent = paperContent;
            if (ch === ' ') playSpaceClick();
            else            playKeyClick();
            if (ch !== '\n') flashKey(ch.toUpperCase());
        }

        function deleteCharFromPaper() {
            if (paperContent.length === 0) return;
            paperContent = paperContent.slice(0, -1);
            typewriterText.textContent = paperContent;
            playBackspace();
        }

        function clearPaper() {
            paperContent = '';
            typewriterText.textContent = '';
        }

        // ---- Flash key highlight ----
        function flashKey(char) {
            const key = document.querySelector(`.key[data-char="${char}"]`);
            if (!key) return;
            key.classList.add('pressed');
            setTimeout(() => key.classList.remove('pressed'), 130);
        }

        // ---- Physical keyboard → paper ----
        document.addEventListener('keydown', (e) => {
            // Ignore keystrokes inside carriage inputs/selects or other non-typewriter input fields
            if (e.target.closest('.carriage-bar') || (e.target.tagName === 'INPUT' && e.target !== userInput) || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
                return;
            }

            if (e.key === 'Backspace') {
                e.preventDefault();
                deleteCharFromPaper();
                flashKey('BACKSPACE');
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                paperContent += '\n';
                typewriterText.textContent = paperContent;
                playReturn();
                flashKey('ENTER');
                return;
            }
            if (e.key.length === 1) {
                e.preventDefault();
                addCharToPaper(e.key.toUpperCase());
            }
        });

        // ---- On-screen keys → paper ----
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const ch = key.dataset.char;
                if (ch === 'BACKSPACE') { deleteCharFromPaper(); return; }
                if (ch === 'ENTER')     {
                    paperContent += '\n';
                    typewriterText.textContent = paperContent;
                    playReturn();
                    return;
                }
                addCharToPaper(ch === ' ' ? ' ' : ch);
            });

            key.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const ch = key.dataset.char;
                if (ch === 'BACKSPACE') { deleteCharFromPaper(); return; }
                if (ch === 'ENTER')     {
                    paperContent += '\n';
                    typewriterText.textContent = paperContent;
                    playReturn();
                    return;
                }
                addCharToPaper(ch === ' ' ? ' ' : ch);
            }, { passive: false });
        });

        // ---- Theme toggle ----
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
            themeToggle.textContent = '☀️';
        }

        // ============================================================
        // VINTAGE & MODERN PDF EXPORT SYSTEM
        // ============================================================
        
        // Toast notification helper
        const pdfToast = document.getElementById("pdfToast");
        function showPdfToast(msg, isSuccess = true) {
            pdfToast.textContent = msg;
            pdfToast.classList.add("show");
            
            if (isSuccess) {
                pdfToast.style.border = "1px solid rgba(59, 130, 246, 0.4)";
                pdfToast.style.background = "rgba(15, 23, 42, 0.95)";
            } else {
                pdfToast.style.border = "1px solid rgba(239, 68, 68, 0.4)";
                pdfToast.style.background = "rgba(28, 10, 10, 0.95)";
            }

            setTimeout(() => {
                pdfToast.classList.remove("show");
            }, 3000);
        }

        // Clear Paper Functionality
        const clearPaperBtn = document.getElementById("clearPaperBtn");
        clearPaperBtn.addEventListener("click", () => {
            if (paperContent.length === 0) {
                showPdfToast("Paper is already clean!");
                return;
            }
            if (confirm("Are you sure you want to clear the paper?")) {
                clearPaper();
                userInput.value = "";
                showPdfToast("Paper cleared!");
                playHeavyKey();
            }
        });

        // Export to PDF Functionality
        const exportPdfBtn = document.getElementById("exportPdfBtn");
        exportPdfBtn.addEventListener("click", () => {
            if (paperContent.trim().length === 0) {
                showPdfToast("Type some text first before exporting!", false);
                return;
            }

            showPdfToast("Generating styled PDF...");

            setTimeout(() => {
                try {
                    // Robust cross-version resolution of the jsPDF constructor
                    let jsPDFClass = null;
                    if (typeof window !== 'undefined') {
                        if (window.jspdf && window.jspdf.jsPDF) {
                            jsPDFClass = window.jspdf.jsPDF;
                        } else if (window.jsPDF) {
                            jsPDFClass = window.jsPDF;
                        }
                    }

                    if (!jsPDFClass) {
                        showPdfToast("PDF library (jsPDF) not loaded yet. Check your connection!", false);
                        return;
                    }

                    const doc = new jsPDFClass({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4'
                    });

                    const pageWidth = doc.internal.pageSize.width;
                    const pageHeight = doc.internal.pageSize.height;

                    const themeElem = document.getElementById("pdfTheme");
                    const titleElem = document.getElementById("pdfTitle");
                    const authorElem = document.getElementById("pdfAuthor");

                    const selectedTheme = themeElem ? themeElem.value : 'vintage';
                    const docTitle = titleElem ? titleElem.value.trim() : '';
                    const docAuthor = authorElem ? authorElem.value.trim() : '';

                    // Adjust layout parameters based on template theme
                    let marginLeft = 20;
                    let marginRight = 20;
                    let marginTop = 35;
                    let marginBottom = 25;
                    
                    // Fallback to strict RGB arrays for 100% universal compatibility across all jsPDF versions
                    let bgRGB = [253, 251, 247]; // #FDFBF7
                    let inkRGB = [45, 45, 45];   // #2D2D2D
                    let fontName = 'courier';
                    let fontStyle = 'normal';
                    let lineSpacing = 8.5; // mm

                    if (selectedTheme === 'vintage') {
                        bgRGB = [253, 248, 240]; // #FDF8F0 - Warm cream parchment
                        inkRGB = [62, 46, 32];    // #3E2E20 - Sepia brown ink
                        fontName = 'courier';
                        lineSpacing = 9.0;
                    } else if (selectedTheme === 'editorial') {
                        bgRGB = [255, 255, 255]; // #FFFFFF - Clean white
                        inkRGB = [31, 31, 31];    // #1F1F1F - Rich charcoal ink
                        fontName = 'times';
                        lineSpacing = 7.5;
                        marginTop = 38;
                    } else if (selectedTheme === 'modern') {
                        bgRGB = [250, 249, 246]; // #FAF9F6 - Ivory gray
                        inkRGB = [15, 23, 42];    // #0F172A - Deep slate
                        fontName = 'helvetica';
                        lineSpacing = 8.0;
                        marginLeft = 24; // Margin spacer for the accent sidebar
                    }

                    const contentWidth = pageWidth - marginLeft - marginRight;
                    let pageNum = 1;

                    // Header, border, and footer graphics builder
                    function drawPageTemplate(currentPNum) {
                        // 1. Fill page background
                        doc.setFillColor(bgRGB[0], bgRGB[1], bgRGB[2]);
                        doc.rect(0, 0, pageWidth, pageHeight, 'F');

                        // 2. Draw border decorations & headers
                        if (selectedTheme === 'vintage') {
                            // Classic thin margins
                            doc.setDrawColor(140, 110, 85); 
                            doc.setLineWidth(0.4);
                            doc.rect(10, 10, pageWidth - 20, pageHeight - 20);
                            doc.rect(11.5, 11.5, pageWidth - 23, pageHeight - 23);

                            // Vintage corner joints
                            doc.setFillColor(140, 110, 85);
                            doc.rect(9, 9, 6, 2, 'F');
                            doc.rect(9, 9, 2, 6, 'F');
                            doc.rect(pageWidth - 15, 9, 6, 2, 'F');
                            doc.rect(pageWidth - 11, 9, 2, 6, 'F');
                            doc.rect(9, pageHeight - 11, 6, 2, 'F');
                            doc.rect(9, pageHeight - 15, 2, 6, 'F');
                            doc.rect(pageWidth - 15, pageHeight - 11, 6, 2, 'F');
                            doc.rect(pageWidth - 11, pageHeight - 15, 2, 6, 'F');

                            // Page Header
                            doc.setFont('courier', 'bold');
                            doc.setFontSize(8.5);
                            doc.setTextColor(140, 110, 85);
                            doc.text('— TYPEWRITER MANUSCRIPT —', pageWidth / 2, 17, { align: 'center' });

                            // Page Footer
                            doc.setFont('courier', 'normal');
                            doc.text(`- Page ${currentPNum} -`, pageWidth / 2, pageHeight - 14, { align: 'center' });

                            // Stamp on Page 1 (Concentric stamp circles)
                            if (currentPNum === 1) {
                                doc.setDrawColor(162, 72, 87); // vintage stamp red
                                doc.setLineWidth(0.6);
                                doc.circle(pageWidth - 30, pageHeight - 34, 12, 'S');
                                doc.circle(pageWidth - 30, pageHeight - 34, 10, 'S');

                                doc.setFont('courier', 'bold');
                                doc.setFontSize(7);
                                doc.setTextColor(162, 72, 87);
                                
                                const today = new Date();
                                const stampDate = today.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                                doc.text(stampDate.toUpperCase(), pageWidth - 30, pageHeight - 32.5, { align: 'center' });
                            }

                        } else if (selectedTheme === 'editorial') {
                            // Double formal frame
                            doc.setDrawColor(40, 40, 40);
                            doc.setLineWidth(0.4);
                            doc.rect(12, 12, pageWidth - 24, pageHeight - 24);
                            doc.setLineWidth(0.2);
                            doc.rect(13.2, 13.2, pageWidth - 26.4, pageHeight - 26.4);

                            // Decorative header
                            doc.setFont('times', 'italic');
                            doc.setFontSize(9.5);
                            doc.setTextColor(80, 80, 80);
                            doc.text('From the Desk of the Author', pageWidth / 2, 20, { align: 'center' });
                            
                            doc.setDrawColor(160, 160, 160);
                            doc.setLineWidth(0.2);
                            doc.line(35, 23, pageWidth - 35, 23);

                            // Page Footer
                            doc.setFont('times', 'normal');
                            doc.setFontSize(8.5);
                            doc.setTextColor(80, 80, 80);
                            doc.text(`Page ${currentPNum}`, pageWidth - 20, pageHeight - 16, { align: 'right' });
                            
                            const today = new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
                            doc.text(today, 20, pageHeight - 16);

                        } else if (selectedTheme === 'modern') {
                            // Minimal blue margin stripe
                            doc.setFillColor(59, 130, 246);
                            doc.rect(12, 12, 4, pageHeight - 24, 'F');

                            // Modern text logo
                            doc.setFont('helvetica', 'bold');
                            doc.setFontSize(7.5);
                            doc.setTextColor(100, 116, 139);
                            doc.text('TYPEWRITER CORE // FRONTEND LABS', 22, 18);

                            // Pagination
                            doc.setFont('helvetica', 'normal');
                            doc.setFontSize(8);
                            doc.setTextColor(100, 116, 139);
                            doc.text(`${currentPNum.toString().padStart(2, '0')}`, pageWidth - 20, pageHeight - 16, { align: 'right' });
                            
                            const today = new Date().toLocaleDateString();
                            doc.text(`EXPORT DATE: ${today}`, 22, pageHeight - 16);
                        }
                    }

                    // Render First Page
                    drawPageTemplate(pageNum);

                    // Render Custom Heading Block
                    let currentY = marginTop;
                    if (docTitle || docAuthor) {
                        if (selectedTheme === 'vintage') {
                            if (docTitle) {
                                doc.setFont('courier', 'bold');
                                doc.setFontSize(20);
                                doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);
                                doc.text(docTitle.toUpperCase(), pageWidth / 2, currentY, { align: 'center' });
                                currentY += 10;
                            }
                            if (docAuthor) {
                                doc.setFont('courier', 'italic');
                                doc.setFontSize(11);
                                doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);
                                doc.text(`by ${docAuthor}`, pageWidth / 2, currentY, { align: 'center' });
                                currentY += 8;
                            }
                            doc.setDrawColor(140, 110, 85);
                            doc.setLineWidth(0.3);
                            doc.line(marginLeft + 15, currentY, pageWidth - marginRight - 15, currentY);
                            currentY += 12;

                        } else if (selectedTheme === 'editorial') {
                            if (docTitle) {
                                doc.setFont('times', 'bold');
                                doc.setFontSize(22);
                                doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);
                                doc.text(docTitle, pageWidth / 2, currentY, { align: 'center' });
                                currentY += 10;
                            }
                            if (docAuthor) {
                                doc.setFont('times', 'italic');
                                doc.setFontSize(12);
                                doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);
                                doc.text(`Written by ${docAuthor}`, pageWidth / 2, currentY, { align: 'center' });
                                currentY += 8;
                            }
                            doc.setDrawColor(60, 60, 60);
                            doc.setLineWidth(0.4);
                            doc.line(marginLeft + 10, currentY, pageWidth - marginRight - 10, currentY);
                            doc.setLineWidth(0.15);
                            doc.line(marginLeft + 10, currentY + 1.0, pageWidth - marginRight - 10, currentY + 1.0);
                            currentY += 12;

                        } else if (selectedTheme === 'modern') {
                            if (docTitle) {
                                doc.setFont('helvetica', 'bold');
                                doc.setFontSize(24);
                                doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);
                                doc.text(docTitle, marginLeft + 2, currentY);
                                currentY += 10;
                            }
                            if (docAuthor) {
                                doc.setFont('helvetica', 'normal');
                                doc.setFontSize(11);
                                doc.setTextColor(100, 116, 139);
                                doc.text(`By ${docAuthor}`, marginLeft + 2, currentY);
                                currentY += 8;
                            }
                            doc.setFillColor(226, 232, 240); 
                            doc.rect(marginLeft + 2, currentY, contentWidth - 4, 1.2, 'F');
                            currentY += 12;
                        }
                    }

                    // Render Paper Content (Auto-wrapped and paginated)
                    const paragraphs = paperContent.split('\n');
                    doc.setFont(fontName, fontStyle);
                    doc.setFontSize(selectedTheme === 'vintage' ? 12 : 11);
                    doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);

                    paragraphs.forEach((pText) => {
                        // Empty line spaces
                        if (pText.trim() === '') {
                            currentY += lineSpacing;
                            if (currentY > pageHeight - marginBottom) {
                                doc.addPage();
                                pageNum++;
                                drawPageTemplate(pageNum);
                                doc.setFont(fontName, fontStyle);
                                doc.setFontSize(selectedTheme === 'vintage' ? 12 : 11);
                                doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);
                                currentY = marginTop - 10;
                            }
                            return;
                        }

                        // Auto split paragraph into wrapped lines
                        const lines = doc.splitTextToSize(pText, contentWidth);
                        lines.forEach((line) => {
                            if (selectedTheme === 'modern') {
                                doc.text(line, marginLeft + 2, currentY);
                            } else {
                                doc.text(line, marginLeft, currentY);
                            }
                            currentY += lineSpacing;

                            if (currentY > pageHeight - marginBottom) {
                                doc.addPage();
                                pageNum++;
                                drawPageTemplate(pageNum);
                                doc.setFont(fontName, fontStyle);
                                doc.setFontSize(selectedTheme === 'vintage' ? 12 : 11);
                                doc.setTextColor(inkRGB[0], inkRGB[1], inkRGB[2]);
                                currentY = marginTop - 10;
                            }
                        });
                    });

                    // Set standard document metadata
                    doc.setProperties({
                        title: docTitle || 'Typewriter Manuscript',
                        author: docAuthor || 'Typewriter Artist',
                        creator: '100 Days 100 Web Projects'
                    });

                    // Save file
                    const filename = (docTitle ? docTitle.toLowerCase().replace(/[^a-z0-9]+/g, '_') : 'manuscript') + '.pdf';
                    doc.save(filename);
                    showPdfToast("Downloaded successfully!");
                } catch (err) {
                    console.error("PDF generation error: ", err);
                    showPdfToast("Failed to generate PDF: " + err.message, false);
                }
            }, 400);
        });
    </script>
</body>
</html>
