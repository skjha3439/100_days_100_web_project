<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23080a1f'/%3E%3Ccircle cx='32' cy='34' r='16' fill='%2328d8ff'/%3E%3Cpath d='M32 9v11M32 48v7M13 34h7M44 34h7M19 21l6 6M45 21l-6 6' stroke='%239a5cff' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell" aria-labelledby="game-title">
    <section class="game-card">
      <div class="game-header">
        <div>
          <p class="eyebrow">Classic logic, neon edge</p>
          <h1 id="game-title">MINESWEEPER</h1>
        </div>
        <div class="header-actions">
          <button class="icon-button" type="button" aria-label="Toggle sound" data-sound-toggle>
            <span aria-hidden="true" data-sound-icon></span>
          </button>
          <button class="icon-button" type="button" aria-label="Toggle light mode" data-theme-toggle>
            <span aria-hidden="true" data-theme-icon></span>
          </button>
        </div>
      </div>

      <div class="difficulty-group" aria-label="Choose difficulty">
        <button class="difficulty-button active" type="button" data-difficulty="easy">Easy</button>
        <button class="difficulty-button" type="button" data-difficulty="medium">Medium</button>
        <button class="difficulty-button" type="button" data-difficulty="hard">Hard</button>
      </div>

      <div class="status-bar" aria-live="polite">
        <div class="stat-panel">
          <span class="stat-label">Mines</span>
          <strong id="mine-count">010</strong>
        </div>
        <button class="restart-button" type="button" id="restart-button">
          <span aria-hidden="true" class="restart-icon"></span>
          Restart
        </button>
        <div class="stat-panel">
          <span class="stat-label">Time</span>
          <strong id="timer">00:00</strong>
        </div>
      </div>

      <p class="game-message" id="game-message">Find every safe tile. Right click or long press to flag.</p>

      <div class="board-wrap">
        <div class="board" id="board" role="grid" aria-label="Minesweeper board"></div>
      </div>
    </section>

    <aside class="guide-card" aria-labelledby="guide-title">
      <h2 id="guide-title">Tile Guide</h2>
      <div class="guide-list">
        <div class="guide-item">
          <span class="guide-tile hidden-cell"></span>
          <span>Unopened tile</span>
        </div>
        <div class="guide-item">
          <span class="guide-tile revealed-cell">2</span>
          <span>Nearby mines</span>
        </div>
        <div class="guide-item">
          <span class="guide-tile flagged-cell" data-guide-flag></span>
          <span>Flagged mine</span>
        </div>
        <div class="guide-item">
          <span class="guide-tile mine-cell" data-guide-mine></span>
          <span>Mine revealed</span>
        </div>
        <div class="guide-item">
          <span class="guide-tile exploded-mine" data-guide-explosion></span>
          <span>Exploded mine</span>
        </div>
      </div>

      <div class="best-score">
        <span>Best time</span>
        <strong id="best-score">--</strong>
      </div>
    </aside>
  </main>

  <div class="modal-backdrop" data-modal hidden>
    <section class="result-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <span class="modal-icon" aria-hidden="true" data-modal-icon></span>
      <h2 id="modal-title" data-modal-title>Game Over</h2>
      <p data-modal-message>Try another board.</p>
      <button class="restart-button modal-restart" type="button" data-modal-restart>Play Again</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
